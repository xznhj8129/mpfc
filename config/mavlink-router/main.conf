[General]
ReportStats=false
TcpServerPort=5760
Log=/var/log/mavlink-router
LogTelemetry=true

# Default UDP ingress for PX4 SITL or any FC already speaking MAVLink over UDP.
[UdpEndpoint flight_controller_in]
Mode=Server
Address=0.0.0.0
Port=14550

# Local HiveOS / MAVSDK consumer. Point the mavsdk_interface conn_str here.
[UdpEndpoint hiveos]
Mode=Normal
Address=127.0.0.1
Port=14540

# Local QGC or another GCS on the same host. Change Address to a LAN peer if needed.
[UdpEndpoint qgc]
Mode=Normal
Address=127.0.0.1
Port=14551

# Uncomment this and disable the UDP ingress section above when using a serial FC.
#[UartEndpoint flight_controller_uart]
#Device=/dev/ttyACM0
#Baud=115200

