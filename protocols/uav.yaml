# Universal UAV command, state, and event contract for flight interfaces.
version: 1

enums:

structs:
  Message:
    variants:
      STATE: StateMessage
      ACTION: ActionMessage
      EVENT: EventMessage

  StateMessage:
    parent: Message
    variants:
      FLIGHT: StateFlightMessage
      NAVIGATION: StateNavigationMessage
      ATTITUDE: StateAttitudeMessage
      SENSOR: StateSensorMessage
      POWER: StatePowerMessage
      CONTROL: StateControlMessage
      SYSTEM: StateSystemMessage

  ActionMessage:
    parent: Message
    variants:
      FLIGHT: ActionFlightMessage
      NAVIGATION: ActionNavigationMessage

  EventMessage:
    parent: Message
    variants:
      FLIGHT: EventFlightMessage
      MISSION: EventMissionMessage


  StateFlightMessage:
    parent: StateMessage
    variants:
      IS_IN_AIR: StateFlightIsInAir
      IS_ARMED: StateFlightIsArmed
      OVERRIDE_ACTIVE: StateFlightOverrideActive
      FAILSAFE: StateFlightFailsafe
      ACTIVE_MODES: StateFlightActiveModes
      ACTIVE_MODE_NAMES: StateFlightActiveModeNames

  StateFlightIsInAir:
    parent: StateFlightMessage
    fields:
      # Vehicle in-air state.
      IsInAir: bool

  StateFlightIsArmed:
    parent: StateFlightMessage
    fields:
      # Vehicle armed state.
      IsArmed: bool

  StateFlightOverrideActive:
    parent: StateFlightMessage
    fields:
      # Manual/RC override currently active at FC.
      OverrideActive: bool

  StateFlightFailsafe:
    parent: StateFlightMessage
    fields:
      # Failsafe state.
      Failsafe: bool

  StateFlightActiveModes:
    parent: StateFlightMessage
    fields:
      # Raw active mode identifiers.
      ActiveModes: list[any]

  StateFlightActiveModeNames:
    parent: StateFlightMessage
    fields:
      # Human-readable active mode names.
      ActiveModeNames: list[string]


  StateNavigationMessage:
    parent: StateMessage
    variants:
      IS_HOME_POSITION_OK: StateNavigationIsHomePositionOk
      IS_GLOBAL_POSITION_OK: StateNavigationIsGlobalPositionOk
      ALTITUDE_M: StateNavigationAltitudeM
      POSITION: StateNavigationPosition
      FIX_TYPE: StateNavigationFixType
      NUM_SAT: StateNavigationNumSat
      NAV_STATE: StateNavigationNavState
      GPS_INFO: StateNavigationGpsInfo
      RAW_GPS: StateNavigationRawGps

  StateNavigationIsHomePositionOk:
    parent: StateNavigationMessage
    fields:
      # Home position validity.
      IsHomePositionOk: bool

  StateNavigationIsGlobalPositionOk:
    parent: StateNavigationMessage
    fields:
      # Global position validity.
      IsGlobalPositionOk: bool

  StateNavigationAltitudeM:
    parent: StateNavigationMessage
    fields:
      # Altitude in meters.
      AltitudeM: float

  StateNavigationPosition:
    parent: StateNavigationMessage
    fields:
      # Current geographic position.
      LatDeg: float
      LonDeg: float
      AbsAltM: float
      RelAltM: float

  StateNavigationFixType:
    parent: StateNavigationMessage
    fields:
      # GNSS fix quality code.
      FixType: int

  StateNavigationNumSat:
    parent: StateNavigationMessage
    fields:
      # GNSS satellites used.
      NumSat: int

  StateNavigationNavState:
    parent: StateNavigationMessage
    fields:
      # Navigation state code.
      NavState: int

  StateNavigationGpsInfo:
    parent: StateNavigationMessage
    fields:
      # Extended GNSS status.
      FixType: int
      NumSat: int
      lastMessageDt: optional float
      errors: optional float
      timeouts: optional float
      hdop: optional float
      eph: optional float
      epv: optional float

  StateNavigationRawGps:
    parent: StateNavigationMessage
    fields:
      # Raw GNSS position/fix sample.
      LatDeg: float
      LonDeg: float
      AbsAltM: float
      GroundSpeedMS: optional float
      GroundCourseDeg: optional float
      Hdop: optional float
      Vdop: optional float
      YawDeg: optional float


  StateAttitudeMessage:
    parent: StateMessage
    variants:
      ATTITUDE_RAD: StateAttitudeAttitudeRad
      ANG_VEL_RAD_S: StateAttitudeAngVelRadS

  StateAttitudeAttitudeRad:
    parent: StateAttitudeMessage
    fields:
      # Euler attitude in radians.
      Roll: float
      Pitch: float
      Yaw: float

  StateAttitudeAngVelRadS:
    parent: StateAttitudeMessage
    fields:
      # Angular velocity in rad/s.
      X: float
      Y: float
      Z: float


  StateSensorMessage:
    parent: StateMessage
    variants:
      IMU: StateSensorImu
      SENSOR_CONFIG: StateSensorSensorConfig

  StateSensorImu:
    parent: StateSensorMessage
    fields:
      # IMU sample containing accel/gyro/mag vectors.
      AccelX: float
      AccelY: float
      AccelZ: float
      GyroRadSX: float
      GyroRadSY: float
      GyroRadSZ: float
      MagX: float
      MagY: float
      MagZ: float
      TemperatureDegC: optional float
      TimestampUs: optional int
      Frame: optional string

  StateSensorSensorConfig:
    parent: StateSensorMessage
    fields:
      # FC sensor presence/configuration and readiness.
      GyroOk: optional bool
      AccelOk: optional bool
      MagOk: optional bool
      LocalPositionOk: optional bool
      GlobalPositionOk: optional bool
      HomePositionOk: optional bool
      Armable: optional bool


  StatePowerMessage:
    parent: StateMessage
    variants:
      BATTERY: StatePowerBattery
      ANALOG: StatePowerAnalog

  StatePowerBattery:
    parent: StatePowerMessage
    fields:
      # Battery status and estimates.
      VoltageV: optional float
      CurrentA: optional float
      PowerW: optional float
      ConsumedMah: optional float
      ConsumedMWh: optional float
      ConsumedAh: optional float
      RemainingPct: optional float
      RemainingCapacity: optional float
      TemperatureDegC: optional float
      BatteryId: optional int
      Rssi: optional float

  StatePowerAnalog:
    parent: StatePowerMessage
    fields:
      # Analog telemetry values.
      vbat: optional float
      amperage: optional float
      powerDraw: optional float
      mAhDrawn: optional float
      mWhDrawn: optional float
      percentageRemaining: optional float
      remainingCapacity: optional float
      rssi: optional float


  StateControlMessage:
    parent: StateMessage
    variants:
      RC_CHANNELS: StateControlRcChannels
      RX_CONFIG: StateControlRxConfig
      CHANNEL_MAP: StateControlChannelMap
      MODE_RANGES: StateControlModeRanges

  StateControlRcChannels:
    parent: StateControlMessage
    fields:
      # Normalized or PWM RC channel snapshot.
      RcChannels: list[float]

  StateControlRxConfig:
    parent: StateControlMessage
    fields:
      # Receiver configuration.
      rxMinUsec: optional int
      rxMaxUsec: optional int
      rxCenterUsec: optional int

  StateControlChannelMap:
    parent: StateControlMessage
    fields:
      # Channel mapping metadata.
      ChannelMap: list[any]

  StateControlModeRanges:
    parent: StateControlMessage
    fields:
      # Mode range/switch configuration.
      ModeRanges: list[any]


  StateSystemMessage:
    parent: StateMessage
    variants:
      FC_CONNECTED: StateSystemFcConnected
      CPU_LOAD: StateSystemCpuLoad
      CYCLE_TIME: StateSystemCycleTime
      FC_INFO: StateSystemFcInfo
      WAYPOINT_INFO: StateSystemWaypointInfo
      GPS_STATISTICS: StateSystemGpsStatistics
      FLIGHT_MODE: StateSystemFlightMode

  StateSystemFcConnected:
    parent: StateSystemMessage
    fields:
      # Flight-controller connectivity state.
      FcConnected: bool

  StateSystemCpuLoad:
    parent: StateSystemMessage
    fields:
      # FC CPU load indicator.
      CpuLoad: int

  StateSystemCycleTime:
    parent: StateSystemMessage
    fields:
      # FC main loop cycle time.
      CycleTime: int

  StateSystemFcInfo:
    parent: StateSystemMessage
    fields:
      # FC identity/version/build metadata.
      ApiVersion: optional string
      FcVariant: optional string
      BoardInfo: optional string
      HardwareUid: optional string
      LegacyUid: optional string
      VendorId: optional int
      VendorName: optional string
      ProductId: optional int
      ProductName: optional string
      FlightSwMajor: optional int
      FlightSwMinor: optional int
      FlightSwPatch: optional int
      FlightSwGitHash: optional string
      OsSwMajor: optional int
      OsSwMinor: optional int
      OsSwPatch: optional int
      OsSwGitHash: optional string

  StateSystemWaypointInfo:
    parent: StateSystemMessage
    fields:
      # Waypoint mission metadata.
      WaypointCount: optional int
      CurrentWaypointIndex: optional int
      MissionValid: optional bool

  StateSystemGpsStatistics:
    parent: StateSystemMessage
    fields:
      # Aggregated GNSS statistics.
      lastMessageDt: optional float
      errors: optional float
      timeouts: optional float
      hdop: optional float
      eph: optional float
      epv: optional float

  StateSystemFlightMode:
    parent: StateSystemMessage
    fields:
      # Primary FC mode label.
      FlightMode: string


  ActionFlightMessage:
    parent: ActionMessage
    variants:
      ARM: ActionFlightArm
      DISARM: ActionFlightDisarm
      SET_TAKEOFF_ALTITUDE: ActionFlightSetTakeoffAltitude
      TAKEOFF: ActionFlightTakeoff
      LAND: ActionFlightLand
      RTL: ActionFlightRtl
      SET_MODE: ActionFlightSetMode

  ActionFlightArm:
    parent: ActionFlightMessage
    # Arm the vehicle.

  ActionFlightDisarm:
    parent: ActionFlightMessage
    # Disarm the vehicle.

  ActionFlightSetTakeoffAltitude:
    parent: ActionFlightMessage
    fields:
      # Set autonomous takeoff target altitude.
      AltitudeM: float

  ActionFlightTakeoff:
    parent: ActionFlightMessage
    # Trigger autonomous takeoff.

  ActionFlightLand:
    parent: ActionFlightMessage
    # Trigger landing.

  ActionFlightRtl:
    parent: ActionFlightMessage
    # Return-to-launch command.

  ActionFlightSetMode:
    parent: ActionFlightMessage
    fields:
      # Enable/disable named flight mode.
      Mode: string
      Enabled: bool


  ActionNavigationMessage:
    parent: ActionMessage
    variants:
      GO_TO: ActionNavigationGoTo
      SET_WAYPOINT: ActionNavigationSetWaypoint
      SELECT_MISSION: ActionNavigationSelectMission

  ActionNavigationGoTo:
    parent: ActionNavigationMessage
    fields:
      # Go to geographic waypoint.
      Latitude: float
      Longitude: float
      AltitudeM: float
      YawDeg: float

  ActionNavigationSetWaypoint:
    parent: ActionNavigationMessage
    fields:
      # Write waypoint entry to FC mission table.
      WaypointIndex: int
      Action: int
      Latitude: float
      Longitude: float
      AltitudeM: float
      Param1: int
      Param2: int
      Param3: int
      Flag: int

  ActionNavigationSelectMission:
    parent: ActionNavigationMessage
    fields:
      # Set mission sequence index.
      Sequence: int


  EventFlightMessage:
    parent: EventMessage
    variants:
      ARMED: EventFlightArmed
      DISARMED: EventFlightDisarmed
      TAKEOFF_DETECTED: EventFlightTakeoffDetected
      LANDED: EventFlightLanded
      FAILSAFE_CHANGED: EventFlightFailsafeChanged

  EventFlightArmed:
    parent: EventFlightMessage
    # Vehicle transitioned to armed.

  EventFlightDisarmed:
    parent: EventFlightMessage
    # Vehicle transitioned to disarmed.

  EventFlightTakeoffDetected:
    parent: EventFlightMessage
    fields:
      # Vehicle detected as airborne.
      AltitudeM: float

  EventFlightLanded:
    parent: EventFlightMessage
    # Vehicle landed.

  EventFlightFailsafeChanged:
    parent: EventFlightMessage
    fields:
      # Failsafe state transition.
      Failsafe: bool


  EventMissionMessage:
    parent: EventMessage
    variants:
      ABORTED: EventMissionAborted
      COMPLETED: EventMissionCompleted

  EventMissionAborted:
    parent: EventMissionMessage
    fields:
      # Mission abort event.
      Reason: string

  EventMissionCompleted:
    parent: EventMissionMessage
    # Mission completion event.