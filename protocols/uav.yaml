# 
version: 1

name: UAV
desc: "Universal UAV command, state, and event contract for flight interfaces."

enums:
  FCAutopilotType:
    - PX4
    - Ardupilot
    - INAV
    - Betaflight

  UAVType:
    - Copter
    - Plane
    - VTOLPlane
    - Tailsitter

  TelemType:
    - Mavlink2
    - MSPV2

structs:
  UAV:
    variants:
      - State
      - Action
      - Event

  State:
    parent: UAV
    variants:
      - StateFlight
      - StateNav
      - StateAttitude
      - StateSensor
      - StatePower
      - StateControl
      - StateSystem

  Action:
    parent: UAV
    variants:
      - ActionFlight
      - ActionNav
      - ActionControl

  Event:
    parent: UAV
    variants:
      - EventFlight
      - EventMission


  StateFlight:
    parent: State
    variants:
    
      IsInAir:
        desc: Vehicle in-air state.  
        key: UAV.State.Flight.IsInAir
        fields:
          IsInAir: bool

      IsArmed:
        desc: Vehicle armed state.
        key: UAV.State.Flight.IsArmed
        fields:
          IsArmed: bool

      OverrideActive:
        desc: Manual/RC override currently active at FC.
        key: UAV.State.Flight.OverrideActive
        fields:
          OverrideActive: bool

      Failsafe:
        desc: Failsafe state.
        key: UAV.State.Flight.Failsafe
        fields:
          Failsafe: bool

      ActiveModes:
        desc: Raw active mode identifiers.
        key: UAV.State.Flight.ActiveModes
        fields:
          ActiveModes: list[any]

      ActiveModeNames:
        desc: Human-readable active mode names.
        key: UAV.State.Flight.ActiveModeNames
        fields:
          ActiveModeNames: list[string]


  StateNav:
    parent: State
    variants:

      IsHomePositionOk:
        desc: Home position validity.
        key: UAV.State.Navigation.IsHomePositionOk
        fields:
          IsHomePositionOk: bool

      IsGlobalPositionOk:
        desc: Global position validity.
        key: UAV.State.Navigation.IsGlobalPositionOk
        fields:
          IsGlobalPositionOk: bool

      AltitudeM:
        desc: Altitude in meters.
        key: UAV.State.Navigation.AltitudeM
        fields:
          AltitudeM: float

      Position:
        desc: Current geographic position.
        key: UAV.State.Navigation.Position
        fields:
          LatDeg: float
          LonDeg: float
          AbsAltM: float
          RelAltM: float

      FixType:
        desc: GNSS fix quality code.
        key: UAV.State.Navigation.FixType
        fields:
          FixType: int

      NumSat:
        desc: GNSS satellites used.
        key: UAV.State.Navigation.NumSat
        fields:
          NumSat: int

      NavState:
        desc: Nav state code.
        key: UAV.State.Navigation.NavState
        fields:
          NavState: int

      GpsInfo:
        desc: Extended GNSS status.
        key: UAV.State.Navigation.GpsInfo
        fields:
          FixType: int
          NumSat: int
          lastMessageDt: optional float
          errors: optional float
          timeouts: optional float
          hdop: optional float
          eph: optional float
          epv: optional float

      RawGps:
        desc: Raw GNSS position/fix sample.
        key: UAV.State.Navigation.RawGps
        fields:
          LatDeg: float
          LonDeg: float
          AbsAltM: float
          GroundSpeedMS: optional float
          GroundCourseDeg: optional float
          Hdop: optional float
          Vdop: optional float
          YawDeg: optional float


  StateAttitude:
    parent: State
    variants:

      AttitudeRad:
        desc: Euler attitude in radians.
        key: UAV.State.Attitude.AttitudeRad
        fields:
          Roll: float
          Pitch: float
          Yaw: float

      AngVelRadS:
        desc: Angular velocity in rad/s.
        key: "UAV.State.Attitude.AngVelRadS"
        fields:
          X: float
          Y: float
          Z: float


  StateSensor:
    parent: State
    variants:

      Imu:
        desc: IMU sample containing accel/gyro/mag vectors.
        key: UAV.State.Sensor.Imu
        fields:
          AccelX: float
          AccelY: float
          AccelZ: float
          GyroRadSX: float
          GyroRadSY: float
          GyroRadSZ: float
          MagX: float
          MagY: float
          MagZ: float
          TemperatureDegC: optional float
          TimestampUs: optional int
          Frame: optional string

      SensorConfig:
        desc: FC sensor presence/configuration and readiness.
        key: UAV.State.Sensor.SensorConfig
        fields:
          GyroOk: optional bool
          AccelOk: optional bool
          MagOk: optional bool
          LocalPositionOk: optional bool
          GlobalPositionOk: optional bool
          HomePositionOk: optional bool
          Armable: optional bool
          ArmReady: optional bool
          TakeoffReady: optional bool
          EkfUsingGps: optional bool
          CanArmOrRun: optional bool
          ModeName: optional string
          ModeProblems: optional list[string]
          HealthProblems: optional list[string]


  StatePower:
    parent: State
    variants:

      Battery:
        desc: Battery status and estimates.
        key: UAV.State.Power.Battery
        fields:
          VoltageV: optional float
          CurrentA: optional float
          PowerW: optional float
          ConsumedMah: optional float
          ConsumedMWh: optional float
          ConsumedAh: optional float
          RemainingPct: optional float
          RemainingCapacity: optional float
          TemperatureDegC: optional float
          BatteryId: optional int
          Rssi: optional float

      Analog:
        desc: Analog telemetry values.
        key: UAV.State.Power.Analog
        fields:
          vbat: optional float
          amperage: optional float
          powerDraw: optional float
          mAhDrawn: optional float
          mWhDrawn: optional float
          percentageRemaining: optional float
          remainingCapacity: optional float
          rssi: optional float


  StateControl:
    parent: State
    variants:
      RC_TELEMETRY: RcTelemetry
      CONTROL_INPUT: ControlInput
      CONTROL_OVERRIDE: ControlOverride
      CONTROL_OUTPUT: ControlOutput
      RX_CONFIG: RxConfig
      CHANNEL_MAP: ChannelMap
      MODE_RANGES: ModeRanges

  RcTelemetry:
    desc: FC-reported RC telemetry, normalized to [-1, 1].
    key: UAV.State.Control.RcTelemetry
    fields:
      Roll: float
      Pitch: float
      Yaw: float
      Throttle: float
      Aux: optional list[float]

  ControlInput:
    desc: Normalized control input produced by a source on the bus.
    key: UAV.State.Control.ControlInput
    fields:
      Roll: float
      Pitch: float
      Yaw: float
      Throttle: float
      Aux: optional list[float]

  ControlOverride:
    desc: Sparse normalized control override mask.
    key: UAV.State.Control.ControlOverride
    fields:
      Roll: optional float
      Pitch: optional float
      Yaw: optional float
      Throttle: optional float
      Aux: optional list[optional float]

  ControlOutput:
    desc: Final normalized control output selected for the interface.
    key: UAV.State.Control.ControlOutput
    fields:
      Roll: float
      Pitch: float
      Yaw: float
      Throttle: float
      Aux: optional list[float]

  RxConfig:
    desc: Receiver configuration.
    key: UAV.State.Control.RxConfig
    fields:
      rxMinUsec: optional int
      rxMaxUsec: optional int
      rxCenterUsec: optional int

  ChannelMap:
    desc: Channel mapping metadata.
    key: UAV.State.Control.ChannelMap
    fields:
      ChannelMap: list[any]

  ModeRanges:
    desc: Mode range/switch configuration.
    key: UAV.State.Control.ModeRanges
    fields:
      ModeRanges: list[any]


  StateSystem:
    parent: State
    variants:

      FcConnected:
        desc: Flight-controller connectivity state.
        key: UAV.State.System.FcConnected
        fields:
          FcConnected: bool

      CpuLoad:
        desc: FC CPU load indicator.
        key: UAV.State.System.CpuLoad
        fields:
          CpuLoad: int

      CycleTime:
        desc: FC main loop cycle time.
        key: UAV.State.System.CycleTime
        fields:
          CycleTime: int

      FcInfo:
        desc: FC identity/version/build metadata.
        key: UAV.State.System.FcInfo
        fields:
          ApiVersion: optional string
          FcVariant: optional string
          BoardInfo: optional string
          HardwareUid: optional \nstring
          LegacyUid: optional string
          VendorId: optional int
          VendorName: optional string
          ProductId: optional int
          ProductName: optional string
          FlightSwMajor: optional int
          FlightSwMinor: optional int
          FlightSwPatch: optional int
          FlightSwGitHash: optional string
          OsSwMajor: optional int
          OsSwMinor: optional int
          OsSwPatch: optional int
          OsSwGitHash: optional string

      WaypointInfo:
        desc: Waypoint mission metadata.
        key: UAV.State.System.WaypointInfo
        fields:
          WaypointCount: optional int
          CurrentWaypointIndex: optional int
          MissionValid: optional bool

      GpsStatistics:
        desc: Aggregated GNSS statistics.
        key: UAV.State.System.GpsStatistics
        fields:
          lastMessageDt: optional float
          errors: optional float
          timeouts: optional float
          hdop: optional float
          eph: optional float
          epv: optional float

      FlightMode:
        desc: Primary FC mode label.
        key: UAV.State.System.FlightMode
        fields:
          FlightMode: string


  ActionFlight:
    parent: Action
    variants:

      Arm: 
        desc: Arm the vehicle.
        key: UAV.Action.Flight.Arm

      Disarm:
        desc: Disarm the vehicle.
        key: UAV.Action.Flight.Disarm

      SetTakeoffAltitude:
        desc: Set autonomous takeoff target altitude.
        key: UAV.Action.Flight.SetTakeoffAltitude
        fields:
          AltitudeM: float

      Takeoff:
        parent: 
        desc: Trigger autonomous takeoff.
        key: UAV.Action.Flight.Takeoff

      Land:
        parent: 
        desc: Trigger landing.
        key: UAV.Action.Flight.Land

      Rtl:
        parent: 
        desc: Return-to-launch command.
        key: UAV.Action.Flight.Rtl

      SetMode:
        parent: 
        desc: Enable/disable named flight mode.
        key: UAV.Action.Flight.SetMode
        fields:
          Mode: string
          Enabled: bool


  ActionNav:
    parent: Action
    variants:

      GoTo:
        desc: Go to geographic waypoint.
        key: UAV.Action.Navigation.GoTo
        fields:
          Latitude: float
          Longitude: float
          AltitudeM: float
          YawDeg: float

      SetWaypoint:
        desc: Write waypoint entry to FC mission table.
        key: UAV.Action.Navigation.SetWaypoint
        fields:
          WaypointIndex: int
          Action: int
          Latitude: float
          Longitude: float
          AltitudeM: float
          Param1: int
          Param2: int
          Param3: int
          Flag: int

      SelectMission:
        desc: Set mission sequence index.
        key: UAV.Action.Navigation.SelectMission
        fields:
          Sequence: int

  ActionControl:
    parent: Action
    variants:

      SetControlOverride:
        desc: Apply sparse normalized control override fields at the interface.
        key: UAV.Action.Control.SetControlOverride
        fields:
          Roll: optional float
          Pitch: optional float
          Yaw: optional float
          Throttle: optional float
          Aux: optional list[optional float]


  EventFlight:
    parent: Event
    variants:

      Armed:
        desc: Vehicle transitioned to armed.
        key: UAV.Event.Flight.Armed

      Disarmed:
        desc: Vehicle transitioned to disarmed.
        key: UAV.Event.Flight.Disarmed

      TakeoffDetected:
        desc: Vehicle detected as airborne.
        key: UAV.Event.Flight.TakeoffDetected
        fields:
          AltitudeM: float

      Landed:
        desc: Vehicle landed.
        key: UAV.Event.Flight.Landed

      FailsafeChanged:
        desc: Failsafe state transition.
        key: UAV.Event.Flight.FailsafeChanged
        fields:
          Failsafe: bool


  EventMission:
    parent: Event
    variants:

      Aborted:
        desc: Mission abort event.
        key: UAV.Event.Mission.Aborted
        fields:
          Reason: string

      Completed:
        desc: Mission completion event.
        key: UAV.Event.Mission.Completed
