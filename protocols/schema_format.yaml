SchemaName: HiveProtocolDomainSchema
SchemaVersion: 1

RequiredTopLevelKeys:
  - Protocol
  - Version
  - Description
  - Kinds
  - Messages

Kinds:
  - State
  - Action
  - Event

DerivedKinds:
  - Query

MessageShape:
  Key: "<Protocol>.<Kind>.<Group>[.<SubGroup>].<Name>"
  Description: Human readable summary
  Fields:
    - Name: FieldName
      Type: "bool|int|float|string|bytes"
      Required: true
      Array: false
  Notes:
    - Query messages are auto-derived from State keys and are not explicitly defined in schemas.
    - Opaque object payloads are not allowed; all fields must be explicitly declared.
    - If Field.Array==true, the field contains a list of the same type, like a C++ definition would be 'int vars[]'