my_name: uav1
core:
  name: test_takeoff_land
  cfg:
    id: px4_core
    mav_port: 14550
    takeoff_altitude_m: 10.0
    takeoff_altitude_ok_fraction: 0.8
    post_takeoff_wait_s: 5.0
    go_north_distance_m: 50.0
    goto_arrival_radius_m: 1.0
    goto_yaw_deg: 0.0
    target_altitude_m: 25.0
    altitude_tolerance_m: 1.0
    altitude_change_timeout_s: 120.0
    home_arrival_radius_m: 1.0
    land_altitude_threshold_m: 0.5
    poll_interval_s: 0.5
    goto_timeout_s: 120.0
    rtl_timeout_s: 180.0
    land_timeout_s: 120.0
    state_timeout_s: 60.0
    response_timeout_s: 20.0
    state_keys:
    - IsHomePositionOk
    - IsGlobalPositionOk
    - IsArmed
    - IsInAir
    - AltitudeM
    - Position
    state_logging:
      keys:
      - IsInAir
      - IsArmed
      - AltitudeM
      interval_s: 0.5
      prefix: CORE
bus_config:
  schema_path: ../../config/bus_topics_schema.json
  log_file: hivebus.log
  endpoint:
    type: mqtt
    host: 127.0.0.1
    port: 1883
plugins:
- plugin: mavsdk_interface
  cfg:
    id: mavsdk
    topic_ns: UAV
    is_interface: true
    conn_type: udp
    conn_str: udp://:<mav_port>
    mav_dialect: PX4
    mav_type: MAV_TYPE_QUADROTOR
    mav_sysid: 1
    mavsdk_log_debug: false
    state_intervals:
      IsInAir: 0.1
      IsArmed: 0.1
      IsHomePositionOk: 0.5
      IsGlobalPositionOk: 0.5
      AltitudeM: 0.1
      Position: 0.2
      AttitudeRad: 0.1
      AngVelRadS: 0.1
      FixType: 0.5
      NumSat: 0.5
      GpsInfo: 0.5
      RawGps: 0.5
      Battery: 0.5
      Imu: 0.1
      FcInfo: 1.0
      FlightMode: 0.2
      SensorConfig: 1.0
      ActiveModeNames: 0.2
